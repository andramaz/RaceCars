<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RC Car Controller</title>
  <style>
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface-alt:  #21262d;
      --primary:      #58a6ff;
      --primary-dark: #1f6feb;
      --success:      #3fb950;
      --danger:       #f85149;
      --warning:      #d29922;
      --text:         #e6edf3;
      --muted:        #8b949e;
      --border:       #30363d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      gap: 14px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .title { font-size: 18px; font-weight: 700; flex-shrink: 0; }
    .status-badge {
      font-size: 12px; font-weight: 600;
      padding: 3px 12px; border-radius: 20px; border: 1px solid;
      flex-shrink: 0;
    }
    .url-input {
      flex: 1; min-width: 180px;
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 6px 10px;
      font-size: 13px; outline: none;
    }
    .btn {
      padding: 6px 18px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600;
      color: #fff; background: var(--primary-dark);
    }
    .btn:hover { background: var(--primary); }

    /* ── Banner ── */
    .banner {
      width: 100%; max-width: 520px;
      padding: 10px 16px; border-radius: 8px;
      font-weight: 700; font-size: 14px; text-align: center;
      display: none;
    }
    .banner-danger  { background: rgba(248,81,73,.15); border: 1px solid var(--danger);  color: var(--danger); }
    .banner-warning { background: rgba(210,153,34,.15); border: 1px solid var(--warning); color: var(--warning); }

    /* ── ARM / DISARM ── */
    .arm-row {
      display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap; justify-content: center;
    }
    .arm-btn {
      padding: 8px 28px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 14px; font-weight: 700;
      color: #000; background: var(--success);
    }
    .arm-btn:disabled, .disarm-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .disarm-btn {
      padding: 8px 28px; border-radius: 8px;
      border: 1px solid var(--border); cursor: pointer;
      font-size: 14px; font-weight: 700;
      color: var(--muted); background: var(--surface-alt);
    }
    .motor-badge {
      padding: 5px 16px; border-radius: 99px;
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      border: 1px solid var(--border);
      background: var(--surface-alt); color: var(--muted);
    }
    .motor-badge.armed     { border-color: var(--success); background: rgba(63,185,80,.15);  color: var(--success); }
    .motor-badge.disarmed  { border-color: var(--border);  background: var(--surface-alt);   color: var(--muted); }
    .motor-badge.emergency { border-color: var(--danger);  background: rgba(248,81,73,.15);   color: var(--danger); }

    /* ── Joystick ── */
    .joy-wrapper {
      position: relative;
      padding: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .joy-outer {
      width: 280px; height: 280px; border-radius: 50%;
      background: #111; border: 2px solid var(--border);
      position: relative; cursor: crosshair;
      touch-action: none; user-select: none;
    }
    .joy-outer.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .cross-h {
      position: absolute; top: 50%; left: 0;
      width: 100%; height: 1px; background: #222;
      transform: translateY(-50%);
    }
    .cross-v {
      position: absolute; left: 50%; top: 0;
      width: 1px; height: 100%; background: #222;
      transform: translateX(-50%);
    }
    .joy-knob {
      position: absolute; width: 70px; height: 70px; border-radius: 50%;
      background: #1e1e1e; border: 2px solid var(--border);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 4px 12px rgba(0,0,0,.6);
    }
    .joy-knob.active { border-color: var(--primary); background: var(--primary-dark); }

    .dir-lbl {
      position: absolute; font-size: 12px; font-weight: 600;
      color: var(--border); pointer-events: none;
    }
    .dir-top    { top: 4px;  left: 50%; transform: translateX(-50%); }
    .dir-bottom { bottom: 4px; left: 50%; transform: translateX(-50%); }
    .dir-left   { left: 4px;  top: 50%; transform: translateY(-50%); }
    .dir-right  { right: 4px; top: 50%; transform: translateY(-50%); }

    /* ── Values ── */
    .val-row {
      display: flex; gap: 24px; align-items: center; justify-content: center;
    }
    .val-box { text-align: center; min-width: 80px; }
    .val-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .val-num   { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .val-unit  { font-size: 13px; font-weight: normal; color: var(--muted); }
    .val-sep   { width: 1px; height: 40px; background: var(--border); }

    .hint { font-size: 12px; color: var(--muted); text-align: center; }

    /* ── E-Stop ── */
    .estop-btn {
      width: 100%; max-width: 520px;
      padding: 16px; border: none; border-radius: 12px;
      background: var(--danger); color: #fff;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .estop-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .estop-btn.active { background: #7d1f1f; border: 2px solid var(--danger); }
    .reset-btn {
      width: 100%; max-width: 520px;
      padding: 10px; border: 1px solid var(--success);
      border-radius: 10px; background: var(--surface-alt);
      color: var(--success); font-size: 13px; font-weight: 600;
      cursor: pointer; display: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <span class="title">🏎 RC Car Controller</span>
    <span id="statusBadge" class="status-badge"
      style="color:var(--danger);border-color:var(--danger);background:rgba(248,81,73,.1)">
      ○ Disconnected
    </span>
    <input id="wsUrl" class="url-input" placeholder="ws://192.168.x.x:8000/ws">
    <button class="btn" onclick="toggleConnect()" id="connectBtn">Connect</button>
  </header>

  <!-- Banners -->
  <div id="emergencyBanner" class="banner banner-danger">
    🛑 EMERGENCY STOP IS ACTIVE — throttle locked at 0
  </div>
  <div id="failsafeBanner" class="banner banner-warning">
    ⚠ FAIL-SAFE — no command received for &gt;1 s
  </div>

  <!-- ARM / DISARM -->
  <div class="arm-row">
    <button class="arm-btn"    id="armBtn"    onclick="sendMsg('arm')"    disabled>ARM</button>
    <button class="disarm-btn" id="disarmBtn" onclick="sendMsg('disarm')" disabled>DISARM</button>
    <span id="motorBadge" class="motor-badge">—</span>
  </div>

  <!-- Joystick -->
  <div class="joy-wrapper">
    <span class="dir-lbl dir-top">▲ Forward</span>
    <span class="dir-lbl dir-bottom">▼ Reverse</span>
    <span class="dir-lbl dir-left">◀</span>
    <span class="dir-lbl dir-right">▶</span>
    <div class="joy-outer disabled" id="joyOuter">
      <div class="cross-h"></div>
      <div class="cross-v"></div>
      <div class="joy-knob" id="joyKnob"></div>
    </div>
  </div>

  <!-- Values -->
  <div class="val-row">
    <div class="val-box">
      <div class="val-label">Steering</div>
      <div class="val-num" id="steerVal" style="color:var(--muted)">0</div>
    </div>
    <div class="val-sep"></div>
    <div class="val-box">
      <div class="val-label">Throttle</div>
      <div class="val-num" id="thrVal" style="color:var(--muted)">0</div>
    </div>
    <div class="val-sep"></div>
    <div class="val-box">
      <div class="val-label">Speed</div>
      <div class="val-num" id="speedVal" style="color:var(--primary)">—<span class="val-unit"> m/s</span></div>
    </div>
  </div>

  <div class="hint">Hold &amp; drag · Release to stop</div>

  <!-- E-Stop -->
  <button class="estop-btn" id="estopBtn" onclick="sendMsg('emergency_stop')" disabled>⚠ EMERGENCY STOP</button>
  <button class="reset-btn"  id="resetBtn"  onclick="sendMsg('reset_emergency_stop')">Reset Emergency Stop</button>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const OUTER = 280, KNOB = 70, R = (OUTER - KNOB) / 2;

  // ── State ────────────────────────────────────────────────────────────────
  let ws = null, connected = false, emergency = false;
  let curS = 0, curT = 0, joystickDown = false, heartbeat = null;

  // ── DOM ──────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const joyOuter   = $('joyOuter');
  const joyKnob    = $('joyKnob');

  // Detect backend IP from current page URL and pre-fill WS input
  (function prefillWsUrl() {
    const host = location.hostname;
    $('wsUrl').value = `ws://${host}:8000/ws`;
  })();

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function toggleConnect() {
    if (connected) { ws?.close(); return; }
    ws = new WebSocket($('wsUrl').value.trim());

    ws.onopen = () => {
      connected = true;
      $('statusBadge').textContent   = '● Connected';
      $('statusBadge').style.color   = 'var(--success)';
      $('statusBadge').style.borderColor = 'var(--success)';
      $('statusBadge').style.background  = 'rgba(63,185,80,.1)';
      $('connectBtn').textContent    = 'Disconnect';
      $('wsUrl').disabled            = true;
      joyOuter.classList.remove('disabled');
      $('armBtn').disabled    = false;
      $('disarmBtn').disabled = false;
      $('estopBtn').disabled  = false;
    };

    ws.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.type !== 'telemetry') return;

      $('speedVal').innerHTML = d.speed + '<span class="val-unit"> m/s</span>';

      // Motor state
      const ms = d.motor_state || '—';
      $('motorBadge').textContent  = ms;
      $('motorBadge').className    = 'motor-badge' +
        (ms === 'ARMED' ? ' armed' : ms === 'EMERGENCY' ? ' emergency' : ms === 'DISARMED' ? ' disarmed' : '');

      // Emergency / failsafe banners
      emergency = d.emergency_stop;
      $('emergencyBanner').style.display = emergency ? 'block' : 'none';
      $('failsafeBanner').style.display  = d.fail_safe  ? 'block' : 'none';
      $('estopBtn').className = 'estop-btn' + (emergency ? ' active' : '');
      $('estopBtn').textContent = emergency ? '🛑 EMERGENCY STOP ACTIVE' : '⚠ EMERGENCY STOP';
      $('resetBtn').style.display = emergency ? 'block' : 'none';
    };

    ws.onclose = ws.onerror = () => {
      connected = false;
      $('statusBadge').textContent   = '○ Disconnected';
      $('statusBadge').style.color   = 'var(--danger)';
      $('statusBadge').style.borderColor = 'var(--danger)';
      $('statusBadge').style.background  = 'rgba(248,81,73,.1)';
      $('connectBtn').textContent    = 'Connect';
      $('wsUrl').disabled            = false;
      joyOuter.classList.add('disabled');
      $('armBtn').disabled    = true;
      $('disarmBtn').disabled = true;
      $('estopBtn').disabled  = true;
      $('motorBadge').textContent = '—';
      $('motorBadge').className   = 'motor-badge';
      snapToCenter(false);
    };
  }

  function sendMsg(type) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type, timestamp: Math.floor(Date.now() / 1000) }));
  }

  function sendDrive(s, t) {
    if (!connected || emergency) return;
    ws.send(JSON.stringify({
      type: 'command', steering: Math.round(s), throttle: Math.round(t),
      mode: 'manual', timestamp: Math.floor(Date.now() / 1000),
    }));
  }

  // ── Joystick ──────────────────────────────────────────────────────────────
  function center() {
    const r = joyOuter.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  function moveKnob(clientX, clientY) {
    const c  = center();
    let dx   = clientX - c.x;
    let dy   = clientY - c.y;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d > R) { dx = dx/d*R; dy = dy/d*R; }

    joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joyKnob.classList.add('active');

    curS = Math.round((dx / R) * 100);
    curT = Math.round((-dy / R) * 100);

    $('steerVal').textContent = (curS > 0 ? '+' : '') + curS;
    $('steerVal').style.color = curS !== 0 ? 'var(--primary)' : 'var(--muted)';
    $('thrVal').textContent   = (curT > 0 ? '+' : '') + curT;
    $('thrVal').style.color   = curT > 0 ? 'var(--success)' : curT < 0 ? 'var(--danger)' : 'var(--muted)';

    sendDrive(curS, curT);
  }

  function snapToCenter(doSend = true) {
    joystickDown = false;
    clearInterval(heartbeat); heartbeat = null;
    joyKnob.style.transition = 'transform 0.2s cubic-bezier(.34,1.56,.64,1)';
    joyKnob.style.transform  = 'translate(-50%,-50%)';
    joyKnob.classList.remove('active');
    setTimeout(() => { joyKnob.style.transition = ''; }, 220);
    curS = 0; curT = 0;
    $('steerVal').textContent = '0'; $('steerVal').style.color = 'var(--muted)';
    $('thrVal').textContent   = '0'; $('thrVal').style.color   = 'var(--muted)';
    if (doSend) sendDrive(0, 0);
  }

  joyOuter.addEventListener('pointerdown', e => {
    if (!connected || emergency) return;
    joystickDown = true;
    joyOuter.setPointerCapture(e.pointerId);
    clearInterval(heartbeat);
    heartbeat = setInterval(() => sendDrive(curS, curT), 200);
    moveKnob(e.clientX, e.clientY);
  });

  joyOuter.addEventListener('pointermove', e => {
    if (!joystickDown) return;
    moveKnob(e.clientX, e.clientY);
  });

  joyOuter.addEventListener('pointerup',     () => snapToCenter());
  joyOuter.addEventListener('pointercancel', () => snapToCenter());
</script>
</body>
</html>
